# Google Ads API Configuration — AlphaRank
# Copy this file to config.yaml and fill in your credentials.

google_ads:
  developer_token: "YOUR_DEVELOPER_TOKEN"
  client_id: "YOUR_OAUTH_CLIENT_ID"
  client_secret: "YOUR_OAUTH_CLIENT_SECRET"
  refresh_token: "YOUR_REFRESH_TOKEN"  # Run: python scripts/generate_refresh_token.py
  login_customer_id: "9738614464"  # AlphaRank MCC (973-861-4464, no dashes)

# Client accounts will be auto-discovered from MCC
client_mapping: {}
