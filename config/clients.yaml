# Centralized client list — single source of truth for all scripts and DAGs.
#
# Keys are the internal client_id used for file paths, S3 keys, and dashboard tokens.
# Fields:
#   name            – human-readable client name
#   google_ads_id   – Google Ads customer ID (no dashes)
#   s3_path         – S3 folder for first-party DPR data
#   athena_id       – client_id in staging.google_ads_campaign_data (may differ from key)
#   prod_id         – client_id in prod.application_data (may differ from athena_id)
#   dashboard_token – SHA-256 token for the GitHub Pages dashboard

